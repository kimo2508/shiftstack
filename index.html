// ─── Schedule builder ─────────────────────────────────────────────────────────
function buildSingleRot(rot){
  if(!rot||!rot.anchorDate) return {};
  var out={}, anchor=new Date(rot.anchorDate+'T00:00:00'), locId=rot.locationId||0;
  if(rot.presetId==='manual'){
    for(var d=-30;d<400;d++){var dt=new Date(anchor);dt.setDate(anchor.getDate()+d);out[fmtDate(dt)]={work:false,locationId:locId,manual:true};}
    return out;
  }
  var preset=null;
  for(var i=0;i<ROTATION_PRESETS.length;i++){if(ROTATION_PRESETS[i].id===rot.presetId){preset=ROTATION_PRESETS[i];break;}}
  if(!preset) return {};
  var pat=[];
  if(preset.on!==null){for(var i=0;i<preset.on;i++)pat.push(true);for(var i=0;i<preset.off;i++)pat.push(false);}
  else if(preset.custom){var w=true;for(var i=0;i<preset.custom.length;i++){for(var j=0;j<preset.custom[i];j++)pat.push(w);w=!w;}}
  else if(rot.customPattern){try{var pts=rot.customPattern.split(',');var w2=true;for(var i=0;i<pts.length;i++){var n=parseInt(pts[i]);if(!isNaN(n))for(var j=0;j<n;j++)pat.push(w2);w2=!w2;}}catch(e){}}
  if(!pat.length) return {};
  for(var d=-30;d<400;d++){
    var dt=new Date(anchor);dt.setDate(anchor.getDate()+d);
    var key=fmtDate(dt),diff=Math.floor((dt-anchor)/86400000),idx=((diff%pat.length)+pat.length)%pat.length;
    out[key]={work:pat[idx],locationId:pat[idx]?locId:null};
  }
  return out;
}

function buildSchedule(rotations,overrides){
  var merged={};
  (rotations||[]).forEach(function(rot){
    var s=buildSingleRot(rot);
    Object.keys(s).forEach(function(key){
      var val=s[key];
      if(!merged[key]){merged[key]=Object.assign({},val);}
      else if(val.work){
        if(!merged[key].work){merged[key].work=true;merged[key].locationId=val.locationId;}
        else{merged[key].conflict=true;if(!merged[key].secondaryLocations)merged[key].secondaryLocations=[];merged[key].secondaryLocations.push(val.locationId);}
      }
    });
  });
  Object.keys(overrides||{}).forEach(function(key){
    if(merged[key])merged[key].override=overrides[key];
    else merged[key]={work:false,locationId:null,override:overrides[key]};
  });
  return merged;
}

function getRotations(){
  var u=STATE.user;
  if(!u) return [];
  if(u.rotations&&u.rotations.length) return u.rotations;
  if(u.rotation) return [Object.assign({},u.rotation,{locationId:0})];
  return [];
}
function getSchedule(){return buildSchedule(getRotations(),STATE.overrides);}

// ─── Pay engine ───────────────────────────────────────────────────────────────
function getFedHolidays(year){
  function nth(m,dow,n){var c=0,dim=new Date(year,m,0).getDate();for(var d=1;d<=dim;d++){var dt=new Date(year,m-1,d);if(dt.getDay()===dow){c++;if(c===n)return fmtDate(dt);}}return null;}
  function last(m,dow){var dim=new Date(year,m,0).getDate();for(var d=dim;d>=1;d--){var dt=new Date(year,m-1,d);if(dt.getDay()===dow)return fmtDate(dt);}return null;}
  var h=[year+'-01-01',year+'-06-19',year+'-07-04',year+'-11-11',year+'-12-25'];
  h.push(nth(1,1,3),nth(2,1,3),last(5,1),nth(9,1,1),nth(10,1,2),nth(11,4,4));
  return h.filter(Boolean);
}
function getHolidays(periodDays){
  var years={};periodDays.forEach(function(k){years[k.slice(0,4)]=1;});
  var h=[];Object.keys(years).forEach(function(y){h=h.concat(getFedHolidays(parseInt(y)));});
  return h;
}
function getCurrPeriodIdx(anchor){return Math.floor((new Date()-new Date(anchor+'T00:00:00'))/86400000/14);}
function getPeriod(anchor,idx){
  var a=new Date(anchor+'T00:00:00'),s=new Date(a);s.setDate(a.getDate()+idx*14);
  var e=new Date(s);e.setDate(s.getDate()+13);
  return {start:fmtDate(s),end:fmtDate(e)};
}
function getEffRate(rh,dateKey){
  if(!rh||!rh.length) return 0;
  var sorted=rh.slice().sort(function(a,b){return b.effectiveDate<a.effectiveDate?1:-1;});
  for(var i=0;i<sorted.length;i++){if(sorted[i].effectiveDate<=dateKey)return sorted[i].rate;}
  return sorted[sorted.length-1].rate;
}
function classifyDay(dateKey,sched,holidays,payRules){
  var rules=payRules&&payRules.length?payRules:DEFAULT_PAY_RULES;
  function m(id,def){for(var i=0;i<rules.length;i++){if(rules[i].id===id)return rules[i].multiplier;}return def;}
  var isHol=holidays.indexOf(dateKey)!==-1,isWork=!!(sched&&sched.work),dow=new Date(dateKey+'T00:00:00').getDay();
  if(isHol&&!isWork) return {type:'hol_off',label:'Holiday (off)',badge:'pr',mult:m('hol_off',1.0)};
  if(isHol&&isWork)  return {type:'hol_work',label:'Holiday worked',badge:'pr',mult:m('hol_work',2.0)};
  if(!isWork){
    if(dow===6||dow===1) return {type:'dt_off',label:'Double time',badge:'pb',mult:m('dt_off',2.0)};
    return {type:'ot_off',label:'OT (off day)',badge:'pa',mult:m('ot_off',1.5)};
  }
  return {type:'base',label:'Regular',badge:null,mult:m('base',1.0)};
}
function calcPay(dateKey,sched,ov,rh,holidays,payRules,diffs){
  var rate=getEffRate(rh,dateKey);
  if(!rate) return {base:0,ot:0,dt:0,holiday:0,diff:0,total:0,breakdown:[],cl:{type:'base',label:'Regular',badge:null,mult:1.0},hrs:0,rate:0};
  var rules=payRules&&payRules.length?payRules:DEFAULT_PAY_RULES;
  var alldiffs=diffs!==undefined?diffs:DEFAULT_DIFFS;
  var cl=classifyDay(dateKey,sched,holidays,rules);
  var hrs=ov&&ov.actualHours!=null?ov.actualHours:(sched&&sched.work?8:0);
  var dow=new Date(dateKey+'T00:00:00').getDay();
  var weekend=sched&&sched.work&&(dow===5||dow===6||dow===0||dow===1);
  function m(id,def){for(var i=0;i<rules.length;i++){if(rules[i].id===id)return rules[i].multiplier;}return def;}
  var base=0,ot=0,dt=0,holiday=0,diff=0,breakdown=[];
  var holM=m('hol_off',1.0),dotM=m('daily_ot',1.5);
  if(cl.type==='hol_off'){var a=8*rate*holM;holiday+=a;breakdown.push({label:'8h holiday pay',amount:a});}
  else if(cl.type==='hol_work'){var a=8*rate*holM;holiday+=a;breakdown.push({label:'8h holiday pay',amount:a});if(hrs>0){var b=hrs*rate*cl.mult;dt+=b;breakdown.push({label:hrs+'h worked @ '+cl.mult+'x DT',amount:b});}}
  else if(cl.type==='dt_off'){var a=hrs*rate*cl.mult;dt+=a;breakdown.push({label:hrs+'h @ '+cl.mult+'x DT',amount:a});}
  else if(cl.type==='ot_off'){var a=hrs*rate*cl.mult;ot+=a;breakdown.push({label:hrs+'h @ '+cl.mult+'x OT',amount:a});}
  else{var rh2=Math.min(hrs,8),ex=Math.max(0,hrs-8);if(rh2>0){var a=rh2*rate;base+=a;breakdown.push({label:rh2+'h base',amount:a});}if(ex>0){var a=ex*rate*dotM;ot+=a;breakdown.push({label:ex+'h OT (over 8h)',amount:a});}}
  (alldiffs||[]).filter(function(d){return d.enabled;}).forEach(function(d){
    var applies=false,dr=d.amount||0;
    if((d.applyTo||[]).indexOf('base')!==-1&&(cl.type==='base'||cl.type==='hol_work')){applies=true;dr=d.amount||0;}
    if((d.applyTo||[]).indexOf('ot')!==-1&&cl.type==='ot_off'){applies=true;dr=d.amountOT||d.amount||0;}
    if((d.applyTo||[]).indexOf('dt')!==-1&&cl.type==='dt_off'){applies=true;dr=d.amountDT||d.amount||0;}
    if((d.applyTo||[]).indexOf('weekend_on')!==-1&&weekend&&cl.type==='base'){applies=true;dr=d.amount||0;}
    if(applies&&dr>0&&hrs>0){var a=dr*hrs;diff+=a;breakdown.push({label:d.label+' (+$'+dr.toFixed(2)+'/h)',amount:a});}
  });
  return {base:base,ot:ot,dt:dt,holiday:holiday,diff:diff,total:base+ot+dt+holiday+diff,breakdown:breakdown,cl:cl,hrs:hrs,rate:rate};
}

// ─── DOM helpers ──────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.keys(attrs).forEach(function(k){
    if(k==='class'){e.className=attrs[k];}
    else if(k==='style'&&typeof attrs[k]==='object'){Object.assign(e.style,attrs[k]);}
    else if(k.startsWith('on')){e.addEventListener(k.slice(2).toLowerCase(),attrs[k]);}
    else if(k==='html'){e.innerHTML=attrs[k];}
    else e.setAttribute(k,attrs[k]);
  });
  if(children) (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c==null||c===false||c===undefined) return;
    if(typeof c==='string'||typeof c==='number') e.appendChild(document.createTextNode(String(c)));
    else if(c instanceof Node) e.appendChild(c);
  });
  return e;
}
function txt(t){return document.createTextNode(String(t||''));}
function div(a,c){return el('div',a,c);}
function btn(a,c){return el('button',Object.assign({type:'button'},a),c);}
function inp(a){return el('input',a);}
function sel(a,opts,curVal){
  var s=el('select',a);
  opts.forEach(function(o){var op=el('option',{value:o.value},o.label);if(o.value===curVal)op.selected=true;s.appendChild(op);});
  return s;
}
function svgIcon(path,size){
  size=size||20;
  var ns='http://www.w3.org/2000/svg';
  var s=document.createElementNS(ns,'svg');
  s.setAttribute('width',size);s.setAttribute('height',size);s.setAttribute('viewBox','0 0 24 24');
  s.setAttribute('fill','none');s.setAttribute('stroke','currentColor');s.setAttribute('stroke-width','1.8');
  s.setAttribute('stroke-linecap','round');s.setAttribute('stroke-linejoin','round');
  s.innerHTML=path;return s;
}

  var s=document.createElementNS(ns,'svg');
  s.setAttribute('width','32');s.setAttribute('height','32');s.setAttribute('viewBox','0 0 32 32');s.setAttribute('fill','none');

// ─── Render engine ────────────────────────────────────────────────────────────
var app=document.getElementById('app');
function render(){
  while(app.firstChild) app.removeChild(app.firstChild);

  // Fuse splash
  if(!STATE.splashDone){
    var splash=renderFuseSplash();
    app.appendChild(splash);
    setTimeout(function(){
      STATE.splashDone=true;
      sessionStorage.setItem('fuse_shiftstack_launched','1');
      render();
    },2400);
    return;
  }

  var params=new URLSearchParams(window.location.search);
  var pub=params.get('view');
  if(pub){renderPublicAsync(pub);return;}
  if(STATE.loading){
    var lw=div({style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}});
    lw.appendChild(div({class:'spinner'}));
    app.appendChild(lw);return;
  }
  if(!STATE.user){app.appendChild(renderOnboard());return;}

  var wrap=div({});
  var page=div({});
  var tab=STATE.tab;
  if(tab==='calendar') page=renderCalendar();
  else if(tab==='hours') page=renderHours();
  else if(tab==='group') page=renderGroup();
  else if(tab==='settings') page=renderSettings();
  wrap.appendChild(page);
  wrap.appendChild(renderFuseFooter());
  if(STATE.modal) wrap.appendChild(renderModal(STATE.modal.key,STATE.modal.data));
  wrap.appendChild(renderNav());
  app.appendChild(wrap);
}

// ─── Public View ──────────────────────────────────────────────────────────────
function renderPublicAsync(handle){
  var lw=div({style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center'}});
  lw.appendChild(div({class:'spinner'}));
  app.appendChild(lw);
  dbGetUser(handle).then(function(userData){
    while(app.firstChild) app.removeChild(app.firstChild);
    if(!userData){
      var wrap=div({style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'2rem',textAlign:'center'}});
      var inner=div();
      inner.appendChild(div({style:{fontSize:'32px',fontWeight:'800',marginBottom:'8px'}},['Shift',el('span',{style:{color:'var(--ac)'}},'Stack')]));
      inner.appendChild(div({style:{color:'var(--tx2)',marginBottom:'1.5rem'}},'Schedule not found for @'+handle));
      inner.appendChild(btn({class:'btn bg',onclick:function(){window.location.href=window.location.pathname;}},'Open app'));
      wrap.appendChild(inner);app.appendChild(wrap);return;
    }
    dbGetOverrides(userData.id).then(function(overrides){
      var rotations=userData.rotations||[];
      if(!rotations.length&&userData.rotation) rotations=[Object.assign({},userData.rotation,{locationId:0})];
      var sched=buildSchedule(rotations,overrides);
      var locs=userData.locations||[];
      var month=new Date().getMonth(),year=new Date().getFullYear();
      var dim=new Date(year,month+1,0).getDate(),fdow=new Date(year,month,1).getDay();
      var pg=div({style:{maxWidth:'480px',margin:'0 auto',paddingBottom:'2rem'}});
      var header2=div({style:{background:'#0d1a2e',padding:'2rem 1rem 1.5rem',textAlign:'center',borderBottom:'1px solid var(--bd)'}});
      header2.appendChild(div({style:{fontSize:'12px',color:'var(--tx3)',marginBottom:'4px',letterSpacing:'.04em',textTransform:'uppercase'}},'ShiftStack'));
      header2.appendChild(div({style:{fontSize:'26px',fontWeight:'800'}},userData.name));
      header2.appendChild(div({style:{fontSize:'13px',color:'var(--tx3)',marginTop:'4px'}},'@'+handle));
      pg.appendChild(header2);
      var content=div({style:{padding:'1rem'}});
      var card=div({class:'card',style:{padding:'1rem'}});
      var pubMonth=month,pubYear=year;
      function buildPubCal(){
        card.innerHTML='';
        var mnav=div({class:'mnav'});
        var pb=btn({class:'mb',onclick:function(){if(pubMonth===0){pubMonth=11;pubYear--;}else pubMonth--;buildPubCal();}});pb.appendChild(ic('chl',16));
        var nb=btn({class:'mb',onclick:function(){if(pubMonth===11){pubMonth=0;pubYear++;}else pubMonth++;buildPubCal();}});nb.appendChild(ic('chr',16));
        mnav.appendChild(pb);mnav.appendChild(div({class:'ml'},MONTHS[pubMonth]+' '+pubYear));mnav.appendChild(nb);
        card.appendChild(mnav);
        var grid3=div({class:'cgr'});
        DAYS.forEach(function(d){grid3.appendChild(div({class:'cdow'},d));});
        var fdow2=new Date(pubYear,pubMonth,1).getDay();
        var dim2=new Date(pubYear,pubMonth+1,0).getDate();
        for(var i=0;i<fdow2;i++) grid3.appendChild(div({class:'cd empty'}));
        var today2=todayKey();
        for(var d=1;d<=dim2;d++){
          var key=pubYear+'-'+pad(pubMonth+1)+'-'+pad(d);
          var s=sched[key];var locId=s&&s.locationId!==null&&s.locationId!==undefined?s.locationId:null;
          var loc=locId!==null?locs.find(function(l){return l.id===locId;}):null;
          var bg=s&&s.work&&loc?loc.color+'33':'transparent';
          var cdiv=div({class:'cd'+(key===today2?' today':'')+(s&&s.work?' work':''),style:{background:bg,cursor:'default'}});
          cdiv.appendChild(el('span',{style:{lineHeight:'1'}},String(d)));
          if(s&&s.work&&loc) cdiv.appendChild(div({style:{width:'5px',height:'5px',borderRadius:'50%',background:loc.color,marginTop:'1px'}}));
          grid3.appendChild(cdiv);
        }
        card.appendChild(grid3);
        if(locs.length){
          var legRow=div({style:{marginTop:'12px',display:'flex',gap:'10px',flexWrap:'wrap'}});
          locs.forEach(function(loc){var li=div({style:{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'var(--tx3)'}});li.appendChild(div({style:{width:'8px',height:'8px',borderRadius:'50%',background:loc.color}}));li.appendChild(txt(loc.name));legRow.appendChild(li);});
          card.appendChild(legRow);
        }
      }
      buildPubCal();
      content.appendChild(card);
      content.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)',textAlign:'center',marginTop:'1rem'}},['Powered by ',el('span',{style:{color:'var(--ac)'}},'ShiftStack')]));
      pg.appendChild(content);app.appendChild(pg);
    });
  }).catch(function(){
    while(app.firstChild) app.removeChild(app.firstChild);
    app.appendChild(div({style:{padding:'2rem',textAlign:'center',color:'var(--tx2)'}},'Could not load schedule. Please try again.'));
  });
}

  if(rot.presetId==='custom'){
    var cl=div();cl.appendChild(el('label',{style:{fontSize:'10px'}},'Pattern (e.g. 4,3)'));
    var ci2=inp({value:rot.customPattern||'',placeholder:'4,3',style:{fontSize:'12px',padding:'5px 8px'}});
    ci2.addEventListener('blur',(function(lid){return function(){updRotation(lid,{customPattern:this.value});};})(loc.id));
    ci2.addEventListener('keydown',function(e){if(e.key==='Enter')this.blur();});
    cl.appendChild(ci2);rotSec.appendChild(cl);
  }
  if(rot.presetId==='manual') rotSec.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)',lineHeight:'1.5'}},'Tap individual days on the calendar to mark them as this job.'));
  card.appendChild(rotSec);pg.appendChild(card);
}

function updLocColor(locId,color){var u=STATE.user,newLocs=(u.locations||[]).map(function(l){return l.id===locId?Object.assign({},l,{color:color}):l;});var upd=Object.assign({},u,{locations:newLocs});STATE.user=upd;saveUser(upd);render();}
function updLocName(locId,name){var u=STATE.user,newLocs=(u.locations||[]).map(function(l){return l.id===locId?Object.assign({},l,{name:name}):l;});var upd=Object.assign({},u,{locations:newLocs});STATE.user=upd;saveUser(upd);render();}
function updRotation(locId,changes){var u=STATE.user,rots=(u.rotations||[]).map(function(r){return r.locationId===locId?Object.assign({},r,changes):r;});if(!rots.find(function(r){return r.locationId===locId;}))rots=rots.concat([Object.assign({presetId:'manual',anchorDate:fmtDate(new Date()),locationId:locId,customPattern:''},changes)]);var upd=Object.assign({},u,{rotations:rots});STATE.user=upd;saveUser(upd);render();}

function renderPaySettings(pg,locs,pay){
  function getLPS(locId){return (pay.locPaySettings||[]).find(function(l){return l.locationId===locId;})||{locationId:locId,rateHistory:[]};}
  function saveLPS(locId,changes){var ex=getLPS(locId);var merged=Object.assign({},ex,changes);pay.locPaySettings=((pay.locPaySettings||[]).filter(function(l){return l.locationId!==locId;})).concat([merged]);savePay(pay);}
  function buildRateSection(rh,onAdd,onDel){
    var sec=div({});
    var rg=div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'8px'}});
    var rInp=inp({type:'number',placeholder:'38.50',min:'0',step:'0.01'});
    var rDate=inp({type:'date',value:fmtDate(new Date())});
    var rd1=div();rd1.appendChild(el('label',null,'Hourly rate ($)'));rd1.appendChild(rInp);rg.appendChild(rd1);
    var rd2=div();rd2.appendChild(el('label',null,'Effective date'));rd2.appendChild(rDate);rg.appendChild(rd2);
    sec.appendChild(rg);
    sec.appendChild(btn({class:'btn bp bsm',style:{width:'100%'},onclick:function(){var r=parseFloat(rInp.value);if(isNaN(r)||r<=0)return;var dt=rDate.value||fmtDate(new Date());var updated=(rh||[]).filter(function(x){return x.effectiveDate!==dt;}).concat([{rate:r,effectiveDate:dt}]).sort(function(a,b){return b.effectiveDate<a.effectiveDate?1:-1;});onAdd(updated);rInp.value='';render();}},[ic('pls',13),txt('Add rate')]));
    if(rh&&rh.length>0){
      var list=div({style:{marginTop:'0.75rem'}});
      rh.slice().sort(function(a,b){return b.effectiveDate<a.effectiveDate?1:-1;}).forEach(function(r,i){
        var row=div({style:{display:'flex',alignItems:'center',gap:'8px',padding:'5px 0',borderBottom:'1px solid var(--bd)',fontSize:'12px'}});
        row.appendChild(el('span',{style:{flex:'1',fontWeight:'500'}},'$'+r.rate.toFixed(2)+'/hr'));
        row.appendChild(el('span',{style:{color:'var(--tx3)',fontSize:'11px'}},'eff. '+r.effectiveDate+(i===0?' (current)':'')));
        var db=btn({class:'btn',style:{background:'none',border:'none',color:'var(--tx3)',padding:'2px'}});db.appendChild(ic('tsh',12));
        db.addEventListener('click',(function(ed){return function(){onDel(ed);render();};})(r.effectiveDate));
        row.appendChild(db);list.appendChild(row);
      });sec.appendChild(list);
    }
    return sec;
  }
  function makeDiffAmtInp(label2,key2,val2,diffsArr2,idx2,onChange2){
    var dd=div();dd.appendChild(el('label',{style:{fontSize:'10px'}},label2));
    var di=inp({type:'number',value:val2||'',placeholder:key2==='amount'?'1.35':key2==='amountOT'?'2.03':'2.70',step:'0.01',min:'0',style:{padding:'6px 8px',fontSize:'12px'}});
    di.addEventListener('blur',(function(k,ii,da,oc){return function(){da[ii][k]=parseFloat(this.value)||0;oc(da);};})(key2,idx2,diffsArr2,onChange2));
    dd.appendChild(di);return dd;
  }
  function buildDiffsSection(diffsArr,onChange){
    var wrap=div({});
    wrap.appendChild(div({style:{fontSize:'12px',color:'var(--tx3)',marginBottom:'0.75rem',lineHeight:'1.5'}},'Flat per-hour additions on top of base pay.'));
    diffsArr.forEach(function(d,i){
      var dc=div({class:'card',style:{marginBottom:'8px',padding:'0.875rem 1rem'}});
      var dh=div({style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:d.enabled?'0.75rem':'0'}});
      var dname=inp({value:d.label,style:{flex:'1',fontWeight:'500',fontSize:'13px',padding:'4px 8px'}});
      dname.addEventListener('blur',(function(ii,da,oc){return function(){da[ii].label=this.value;oc(da);};})(i,diffsArr,onChange));
      dh.appendChild(dname);
      var tog=div({class:'tog'+(d.enabled?' on':'')});tog.appendChild(div({class:'tok'}));
      tog.addEventListener('click',(function(ii,da,oc){return function(){da[ii].enabled=!da[ii].enabled;oc(da);render();};})(i,diffsArr,onChange));
      dh.appendChild(tog);
      var delD=btn({class:'btn',style:{background:'none',border:'none',color:'var(--tx3)',padding:'4px'}});delD.appendChild(ic('tsh',13));
      delD.addEventListener('click',(function(ii,da,oc){return function(){da.splice(ii,1);oc(da);render();};})(i,diffsArr,onChange));
      dh.appendChild(delD);dc.appendChild(dh);
      if(d.enabled){
        var dg=div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'6px',marginBottom:'6px'}});
        dg.appendChild(makeDiffAmtInp('Base $/hr','amount',d.amount,diffsArr,i,onChange));
        dg.appendChild(makeDiffAmtInp('OT $/hr','amountOT',d.amountOT,diffsArr,i,onChange));
        dg.appendChild(makeDiffAmtInp('DT $/hr','amountDT',d.amountDT,diffsArr,i,onChange));
        dc.appendChild(dg);
        var applyRow=div({style:{display:'flex',gap:'5px',flexWrap:'wrap'}});
        [['base','Regular'],['ot','OT days'],['dt','DT days'],['weekend_on','Weekends on']].forEach(function(v){
          var isSel=(d.applyTo||[]).indexOf(v[0])!==-1;
          var ab=btn({class:'tag bsm'+(isSel?' sel':''),style:{fontSize:'10px',padding:'3px 8px'}},v[1]);
          ab.addEventListener('click',(function(ii,val3,da,oc,b){return function(){var cur=da[ii].applyTo||[];da[ii].applyTo=cur.indexOf(val3)!==-1?cur.filter(function(x){return x!==val3;}):cur.concat([val3]);oc(da);b.className='tag bsm'+(da[ii].applyTo.indexOf(val3)!==-1?' sel':'');};})(i,v[0],diffsArr,onChange,ab));
          applyRow.appendChild(ab);
        });dc.appendChild(applyRow);
      }
      wrap.appendChild(dc);
    });
    wrap.appendChild(btn({class:'btn bg bsm',style:{width:'100%'},onclick:function(){diffsArr.push({id:'d'+Date.now(),label:'New differential',applyTo:['base'],amount:0,amountOT:0,amountDT:0,enabled:true});onChange(diffsArr);render();}},[ic('pls',13),txt('Add differential')]));
    return wrap;
  }
  function buildMultipliersSection(rules,onChange){
    var wrap2=div({});
    wrap2.appendChild(div({style:{fontSize:'12px',color:'var(--tx3)',marginBottom:'0.5rem'}},'Quick-start with a preset, then customize below:'));
    var presetRow=div({style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'0.75rem'}});
    PAY_RULE_PRESETS.forEach(function(p){var pb=btn({class:'tag bsm',style:{fontSize:'11px'}},p.label);pb.setAttribute('title',p.desc);pb.addEventListener('click',function(){var newRules=p.rules.map(function(r){return Object.assign({},r);});onChange(newRules);render();});presetRow.appendChild(pb);});
    wrap2.appendChild(presetRow);
    var card2=div({class:'card',style:{padding:'0.75rem 1rem'}});
    rules.forEach(function(rule,i){
      var rrow=div({style:{padding:'8px 0',borderBottom:'1px solid var(--bd)'}});
      var rh2=div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'4px'}});
      rh2.appendChild(el('span',{style:{flex:'1',fontSize:'13px',fontWeight:'500'}},rule.label));
      var minp=inp({type:'number',value:rule.multiplier,step:'0.25',min:'0.5',max:'4',style:{width:'64px',padding:'4px 8px',fontSize:'13px',textAlign:'center'}});
      minp.addEventListener('blur',(function(ii,r2,oc){return function(){r2[ii].multiplier=parseFloat(this.value)||1.0;oc(r2);};})(i,rules,onChange));
      rh2.appendChild(minp);rh2.appendChild(el('span',{style:{fontSize:'12px',color:'var(--tx3)'}},'x'));
      rrow.appendChild(rh2);rrow.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)'}},rule.condition));
      card2.appendChild(rrow);
    });wrap2.appendChild(card2);return wrap2;
  }
  function buildAnchorSection(anchor,onChange){
    var c=div({class:'card',style:{padding:'1rem'}});
    c.appendChild(el('label',null,'First day of your current bi-weekly pay period'));
    var ppi=inp({type:'date',value:anchor||fmtDate(new Date()),style:{marginBottom:'8px'}});
    ppi.addEventListener('change',function(){onChange(this.value);});
    c.appendChild(ppi);c.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)'}},'Set once - all periods calculate from here.'));
    return c;
  }
  function buildJobSection(locId,isGlobal){
    var lps=getLPS(locId);
    var rh=isGlobal?(pay.rateHistory||[]):(lps.rateHistory||[]);
    var defaultRules=isGlobal?DEFAULT_PAY_RULES:STANDARD_PAY_RULES;
    var rules=(lps.payRules&&lps.payRules.length)?lps.payRules:defaultRules.map(function(r){return Object.assign({},r);});
    var defaultDiffs=isGlobal?DEFAULT_DIFFS:[];
    var diffs=lps.differentials!==undefined?lps.differentials:defaultDiffs.map(function(d){return Object.assign({},d,{applyTo:(d.applyTo||[]).slice()});});
    var anchor=(lps.payPeriodAnchor)||(isGlobal?pay.payPeriodAnchor:null)||pay.payPeriodAnchor||fmtDate(new Date());
    var curRate=getEffRate(rh,fmtDate(new Date()));
    var wrap=div({});
    if(curRate>0){var banner=div({style:{background:'rgba(45,184,122,0.1)',border:'1px solid rgba(45,184,122,0.2)',borderRadius:'8px',padding:'10px 14px',marginBottom:'1rem'}});banner.appendChild(div({style:{fontSize:'13px',fontWeight:'500',color:'var(--gr)'}},'Current rate: $'+curRate.toFixed(2)+'/hr'));wrap.appendChild(banner);}
    wrap.appendChild(div({class:'slab'},'Hourly rate history'));
    var rCard=div({class:'card',style:{marginBottom:'1rem',padding:'1rem'}});
    rCard.appendChild(buildRateSection(rh,
      function(updated){if(isGlobal){pay.rateHistory=updated;savePay(pay);}else saveLPS(locId,{rateHistory:updated});},
      function(ed){var upd=rh.filter(function(x){return x.effectiveDate!==ed;});if(isGlobal){pay.rateHistory=upd;savePay(pay);}else saveLPS(locId,{rateHistory:upd});}
    ));wrap.appendChild(rCard);
    wrap.appendChild(div({class:'slab'},'Pay differentials'));
    wrap.appendChild(buildDiffsSection(diffs,function(updated){if(isGlobal){pay.differentials=updated;savePay(pay);}else saveLPS(locId,{differentials:updated});}));
    wrap.appendChild(div({class:'slab',style:{marginTop:'1rem'}},'Pay multipliers'));
    wrap.appendChild(buildMultipliersSection(rules,function(updated){if(isGlobal){pay.payRules=updated;savePay(pay);}else saveLPS(locId,{payRules:updated});}));
    wrap.appendChild(div({class:'slab',style:{marginTop:'1rem'}},'Pay period anchor'));
    wrap.appendChild(buildAnchorSection(anchor,function(val){if(isGlobal){pay.payPeriodAnchor=val;savePay(pay);}else saveLPS(locId,{payPeriodAnchor:val});}));
    return wrap;
  }
  var saveBtn=btn({class:'btn bp',style:{width:'100%',marginTop:'1rem'},onclick:function(){savePay(pay);this.textContent='Saved!';var self=this;setTimeout(function(){self.textContent='';self.appendChild(ic('chk',15));self.appendChild(txt(' Save pay settings'));},2000);}},[ic('chk',15),txt(' Save pay settings')]);
  if(locs.length<=1){pg.appendChild(buildJobSection(locs.length?locs[0].id:0,true));pg.appendChild(saveBtn);return;}
  if(!STATE.payJobTab) STATE.payJobTab=String(locs[0].id);
  var tabRow=div({style:{display:'flex',borderBottom:'1px solid var(--bd)',marginBottom:'1.25rem',overflowX:'auto'}});
  locs.forEach(function(loc){
    var isOn=STATE.payJobTab===String(loc.id);
    var tb=btn({style:{padding:'9px 14px',fontSize:'12px',fontWeight:'500',background:'none',border:'none',borderBottom:isOn?'2px solid '+loc.color:'2px solid transparent',color:isOn?loc.color:'var(--tx3)',cursor:'pointer',fontFamily:'inherit',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:'5px'}});
    tb.appendChild(div({style:{width:'7px',height:'7px',borderRadius:'50%',background:loc.color,flexShrink:'0'}}));tb.appendChild(txt(loc.name));
    tb.addEventListener('click',(function(lid){return function(){STATE.payJobTab=String(lid);render();};})(loc.id));tabRow.appendChild(tb);
  });
  pg.appendChild(tabRow);
  var activeLoc=locs.find(function(l){return String(l.id)===STATE.payJobTab;})||locs[0];
  var isFirst=activeLoc.id===locs[0].id;
  pg.appendChild(buildJobSection(activeLoc.id,isFirst));pg.appendChild(saveBtn);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
(function boot(){
  // Check sessionStorage for splash — show every fresh session
  if(sessionStorage.getItem('fuse_shiftstack_launched')){
    STATE.splashDone=true;
  }
  var params=new URLSearchParams(window.location.search);
  if(params.get('view')){STATE.loading=false;STATE.splashDone=true;render();return;}
  var savedHandle=lcGet('ss_handle',null);
  if(savedHandle){
    dbGetUser(savedHandle).then(function(u){
      if(u){
        STATE.user=u;
        return Promise.all([dbGetOverrides(u.id),dbGetPay(u.id)]).then(function(results){
          STATE.overrides=results[0]||{};
          STATE.pay=results[1]||Object.assign({},DEFAULT_PAY);
          STATE.loading=false;render();
        });
      } else {
        localStorage.removeItem('ss_handle');
        STATE.loading=false;render();
      }
    }).catch(function(){STATE.loading=false;render();});
  } else {
    STATE.loading=false;render();
  }
})();
</script>
