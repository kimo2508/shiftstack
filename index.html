<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d1a2e;--bg2:#112236;--bg3:#1a2f45;--card:#15263d;
  --tx:#e8edf2;--tx2:#8fa4bc;--tx3:#4d6680;
  --ac:#1D9E75;--ac2:#0F6E56;
  --bd:#1e3450;--red:#e05555;--warn:#e09a30;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font);min-height:100vh;overflow-x:hidden}
#app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:70px}
.logo{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:4px}
.logo span{color:var(--ac)}
label{display:block;font-size:12px;color:var(--tx2);margin-bottom:5px;margin-top:12px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:var(--font);font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--ac)}
select option{background:var(--bg3)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:10px;cursor:pointer;font-family:var(--font);font-size:14px;font-weight:500;padding:11px 16px;transition:opacity .15s,transform .1s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.bp{background:var(--ac);color:#fff}
.bp:hover{background:var(--ac2)}
.bg{background:var(--bg3);color:var(--tx2);border:1px solid var(--bd)}
.bg:hover{color:var(--tx)}
.bd2{background:transparent;color:var(--red);border:1px solid var(--red)}
.bsm{font-size:12px;padding:7px 12px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--bd);overflow:hidden}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--tx3);margin:16px 0 8px;padding:0 4px}
.page{padding:16px}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-title{font-size:20px;font-weight:700}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--bg2);border-top:1px solid var(--bd);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px;background:none;border:none;color:var(--tx3);font-family:var(--font);font-size:10px;cursor:pointer;transition:color .15s}
.ni.on{color:var(--ac)}
.ni svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.ob{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.oc{background:var(--card);border-radius:20px;border:1px solid var(--bd);padding:28px 24px;width:100%;max-width:400px}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--bg3);border:1px solid var(--bd);transition:all .2s}
.sdot.on{background:var(--ac);border-color:var(--ac)}
.sdot.dn{background:var(--ac2);border-color:var(--ac2)}
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--bd)}
.month-btn{background:var(--bg3);border:1px solid var(--bd);border-radius:8px;color:var(--tx2);cursor:pointer;padding:5px 9px;display:flex;align-items:center}
.month-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.month-label{font-size:15px;font-weight:600}
.cgr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px}
.cdow{font-size:10px;color:var(--tx3);text-align:center;padding:4px 0;font-weight:600}
.cd{min-height:36px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--tx2);gap:2px;cursor:pointer;transition:background .1s}
.cd:hover{background:var(--bg3)}
.cd.empty{cursor:default;pointer-events:none}
.cd.today{border:1.5px solid var(--ac);color:var(--ac);font-weight:700}
.cd.work{color:var(--tx)}
.cd.off{color:var(--tx3)}
.od{width:4px;height:4px;border-radius:50%;background:var(--warn)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:flex-end;justify-content:center;z-index:200;padding:0}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--bd);border-bottom:none;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 16px}
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.tag{padding:6px 12px;border-radius:20px;border:1px solid var(--bd);background:var(--bg3);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s}
.tag.on{background:var(--ac);border-color:var(--ac);color:#fff}
.share-box{background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--tx2);word-break:break-all;margin-bottom:10px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bd)}
.toggle-row:last-child{border-bottom:none}
.tgl{width:40px;height:22px;border-radius:11px;background:var(--bg3);border:1px solid var(--bd);cursor:pointer;position:relative;transition:background .2s}
.tgl.on{background:var(--ac);border-color:var(--ac)}
.tgl::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:transform .2s}
.tgl.on::after{transform:translateX(18px)}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.pill-g{background:#0F6E5622;color:var(--ac)}
.pill-r{background:#e0555522;color:var(--red)}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:#e0555522;border:1px solid #e0555544;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--red);margin:8px 0}
.ok{background:#1D9E7522;border:1px solid #1D9E7544;border-radius:10px;padding:10px 14px;font-size:13px;color:var(--ac);margin:8px 0}
.fu{flex:1;display:flex;flex-direction:column}
.loc-chip{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--bd);border-radius:10px;padding:8px 12px;margin-bottom:6px}
.loc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid var(--bd);font-size:13px}
.pay-row:last-child{border-bottom:none}
.pay-val{font-weight:600;color:var(--ac)}
.group-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;background:var(--bg3);border:1px solid var(--bd);flex-shrink:0}
</style>
</head>

<script>
// ─── Supabase config ──────────────────────────────────────────────────────────
var SUPA_URL='https://bynpdarzrkmpqwnfkdwz.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5bnBkYXJ6cmttcHF3bmZrZHd6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTI2NjIsImV4cCI6MjA4OTg2ODY2Mn0.EYZr-HnPekTcFMymck-4Yhvz_V-6zbRkHBzqBbumB10';

async function supa(path,opts){
  var res=await fetch(SUPA_URL+'/rest/v1/'+path,Object.assign({
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'return=representation'}
  },opts));
  if(!res.ok){var e=await res.text();throw new Error(e);}
  var txt=await res.text();
  return txt?JSON.parse(txt):null;
}

async function dbGetUser(handle){
  var rows=await supa('users?handle=eq.'+encodeURIComponent(handle)+'&select=*&limit=1');
  return rows&&rows.length?rows[0]:null;
}
async function dbCreateUser(data){
  var rows=await supa('users',{method:'POST',body:JSON.stringify(data)});
  return rows&&rows.length?rows[0]:null;
}
async function dbUpdateUser(id,data){
  await supa('users?id=eq.'+id,{method:'PATCH',body:JSON.stringify(data)});
}
async function dbGetOverrides(userId){
  var rows=await supa('overrides?user_id=eq.'+userId+'&select=*');
  var map={};
  (rows||[]).forEach(function(r){map[r.date_key]=r.data;});
  return map;
}
async function dbUpsertOverride(userId,dateKey,data){
  await supa('overrides',{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify({user_id:userId,date_key:dateKey,data:data})
  });
}

}
async function dbGetPay(userId){
  var rows=await supa('pay_settings?user_id=eq.'+userId+'&select=*&limit=1');
  return rows&&rows.length?rows[0].settings:null;
}
async function dbUpsertPay(userId,settings){
  await supa('pay_settings',{method:'POST',
    headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=representation'},
    body:JSON.stringify({user_id:userId,settings:settings})
  });
}
async function dbHandleAvailable(handle){
  var rows=await supa('users?handle=eq.'+encodeURIComponent(handle)+'&select=id&limit=1');
  return !rows||rows.length===0;

// ─── Local session cache (avoids re-fetching on every render) ─────────────────
var SESSION={user:null,overrides:{},pay:null};

// ─── Constants ────────────────────────────────────────────────────────────────
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS=['S','M','T','W','T','F','S'];
var LOC_COLORS=['#1D9E75','#3B8BD4','#D85A30','#9B59B6','#E09A30','#E05555'];
var PRESETS=[
  {id:'10on4off',label:'10 on / 4 off',on:10,off:4},
  {id:'panama',label:'Panama (2-2-3)',pattern:[2,2,3,2,2,3]},
  {id:'pitman',label:'Pitman (2-3-2-2)',pattern:[2,3,2,2]},
  {id:'223',label:'2-2-3 rotating',pattern:[2,2,3]},
  {id:'4on4off',label:'4 on / 4 off',on:4,off:4},
  {id:'3on4off',label:'3 on / 4 off',on:3,off:4},
  {id:'manual',label:'Manual (no rotation)',on:0,off:0}
];
var OVERRIDE_TAGS=['Stayed Late','Left Early','Called In','Day Off Trade','Training','OT Pickup','Launch Delay','Scrubbed'];

function fmtDate(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function pad(n){return String(n).padStart(2,'0');}
function todayKey(){return fmtDate(new Date());}

// ─── Schedule builder ─────────────────────────────────────────────────────────
function buildSchedule(rotations,overrides){
  var sched={};
  var now=new Date();
  var start=new Date(now.getFullYear()-1,0,1);
  var end=new Date(now.getFullYear()+2,11,31);
  for(var d=new Date(start);d<=end;d.setDate(d.getDate()+1)){
    var key=fmtDate(d);
    var worked=false;var locId=null;
    (rotations||[]).forEach(function(rot){
      if(rot.presetId==='manual') return;
      var preset=PRESETS.find(function(p){return p.id===rot.presetId;})||PRESETS[0];
      var anchor=new Date(rot.anchorDate||fmtDate(new Date()));
      anchor.setHours(0,0,0,0);
      var cur=new Date(d);cur.setHours(0,0,0,0);
      var diff=Math.round((cur-anchor)/(86400000));
      var isWork=false;
      if(preset.pattern){
        var tot=preset.pattern.reduce(function(a,b){return a+b;},0);
        var pos=((diff%tot)+tot)%tot;
        var acc=0;
        for(var i=0;i<preset.pattern.length;i++){
          acc+=preset.pattern[i];
          if(pos<acc){isWork=(i%2===0);break;}
        }
      } else if(preset.on>0){
        var cyc=preset.on+preset.off;
        var p=((diff%cyc)+cyc)%cyc;
        isWork=p<preset.on;
      }
      if(isWork){worked=true;locId=rot.locationId;}
    });
    var ov=overrides&&overrides[key];
    sched[key]={work:worked,locationId:locId,override:ov||null};
  }
  return sched;
}

// ─── DOM helpers ─────────────────────────────────────────────────────────────
function el(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(function(kv){
    if(kv[0]==='class') e.className=kv[1];
    else if(kv[0].startsWith('on')) e.addEventListener(kv[0].slice(2).toLowerCase(),kv[1]);
    else if(kv[0]==='style'&&typeof kv[1]==='object') Object.assign(e.style,kv[1]);
    else e.setAttribute(kv[0],kv[1]);
  });
  if(children) (Array.isArray(children)?children:[children]).forEach(function(c){
    if(c===null||c===undefined) return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c);
  });
  return e;
}
function div(a,c){return el('div',a,c);}
function btn(a,c){return el('button',Object.assign({class:'btn'},a),c);}
function inp(a){return el('input',a);}
function txt(s){return document.createTextNode(s);}
function svgEl(html,size){
  var s=document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('viewBox','0 0 24 24');s.setAttribute('width',size||18);s.setAttribute('height',size||18);
  s.style.cssText='stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0';
  s.innerHTML=html;return s;
}
var ICONS={
  cal:'<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>',
  clk:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
  usr:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>',
  shr:'<circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>',
  pls:'<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',
  tsh:'<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>',
  chk:'<polyline points="20 6 9 17 4 12"/>',
  chl:'<polyline points="15 18 9 12 15 6"/>',
  chr:'<polyline points="9 18 15 12 9 6"/>',
  cpy:'<rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>',
  x:'<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  dol:'<line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>',
  lck:'<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>'
};
function ic(name,size){return svgEl(ICONS[name]||'',size);}

// ─── App state ────────────────────────────────────────────────────────────────
var STATE={tab:'calendar',modal:null,ob:{step:0,name:'',handle:'',handleOk:null,presetId:'10on4off',anchorDate:fmtDate(new Date()),locs:[{id:0,name:'Primary Job',color:LOC_COLORS[0]}],customPat:''}};

// ─── Render engine ────────────────────────────────────────────────────────────
var app=document.getElementById('app');
function render(){
  while(app.firstChild) app.removeChild(app.firstChild);
  var params=new URLSearchParams(window.location.search);
  var pub=params.get('view');
  if(pub){renderPublicAsync(pub);return;}
  if(!SESSION.user){app.appendChild(renderOnboard());return;}
  app.appendChild(renderApp());
}

// ─── Public View (async, fetches from Supabase) ───────────────────────────────
function renderPublicAsync(handle){
  var wrap=div({style:{maxWidth:'480px',margin:'0 auto',paddingBottom:'2rem'}});
  var loading=div({style:{display:'flex',alignItems:'center',justifyContent:'center',padding:'3rem'}});
  loading.appendChild(div({class:'spinner'}));
  wrap.appendChild(loading);
  app.appendChild(wrap);
  dbGetUser(handle).then(function(userData){
    wrap.removeChild(loading);
    if(!userData){
      var inner=div({style:{textAlign:'center',padding:'3rem 1rem'}});
      inner.appendChild(div({class:'logo',style:{marginBottom:'8px'}},['Shift',el('span',null,'Stack')]));
      inner.appendChild(div({style:{color:'var(--tx2)',marginBottom:'1.5rem'}},'Schedule not found for @'+handle));
      inner.appendChild(btn({class:'bg',onclick:function(){window.location.href=window.location.pathname;}},'Open app'));
      wrap.appendChild(inner);
      return;
    }
    dbGetOverrides(userData.id).then(function(overrides){
      var rotations=userData.rotations||[];
      if(!rotations.length&&userData.rotation) rotations=[Object.assign({},userData.rotation,{locationId:0})];
      var schedule=buildSchedule(rotations,overrides);
      var locs=userData.locations||[];
      var header=div({style:{background:'#0d1a2e',padding:'2rem 1rem 1.5rem',textAlign:'center',borderBottom:'1px solid var(--bd)'}});
      header.appendChild(div({style:{fontSize:'12px',color:'var(--tx3)',marginBottom:'4px',letterSpacing:'.04em',textTransform:'uppercase'}},'ShiftStack'));
      header.appendChild(div({style:{fontSize:'26px',fontWeight:'800'}},userData.name));
      header.appendChild(div({style:{fontSize:'13px',color:'var(--tx3)',marginTop:'4px'}},'@'+handle));
      wrap.appendChild(header);
      var content=div({style:{padding:'1rem'}});
      var calCard=div({class:'card',style:{padding:'0'}});
      var now=new Date();
      var curMonth=now.getMonth(),curYear=now.getFullYear();
      function buildCal(month,year){
        calCard.innerHTML='';
        var nav=div({class:'month-nav'});
        var prevBtn=btn({class:'month-btn',onclick:function(){
          if(month===0){buildCal(11,year-1);}else{buildCal(month-1,year);}
        }},[ic('chl',14)]);
        var nextBtn=btn({class:'month-btn',onclick:function(){
          if(month===11){buildCal(0,year+1);}else{buildCal(month+1,year);}
        }},[ic('chr',14)]);
        nav.appendChild(prevBtn);
        nav.appendChild(div({class:'month-label'},MONTHS[month]+' '+year));
        nav.appendChild(nextBtn);
        calCard.appendChild(nav);
        var grid=div({class:'cgr'});
        DAYS.forEach(function(d){grid.appendChild(div({class:'cdow'},d));});
        var fdow=new Date(year,month,1).getDay();
        var dim=new Date(year,month+1,0).getDate();
        var today=todayKey();
        for(var i=0;i<fdow;i++) grid.appendChild(div({class:'cd empty'}));
        for(var d=1;d<=dim;d++){
          var key=year+'-'+pad(month+1)+'-'+pad(d);
          var s=schedule[key];
          var locId=s&&s.locationId!=null?s.locationId:null;
          var loc=locId!=null?locs.find(function(l){return l.id===locId;}):null;
          var bg=s&&s.work&&loc?loc.color+'33':'transparent';
          var cls='cd'+(key===today?' today':'')+(s&&s.work?' work':' off');
          var cell=div({class:cls,style:{background:bg,cursor:'default'}});
          cell.appendChild(el('span',{style:{lineHeight:'1'}},String(d)));
          if(s&&s.work&&loc) cell.appendChild(div({style:{width:'4px',height:'4px',borderRadius:'50%',background:loc.color,marginTop:'2px'}}));
          grid.appendChild(cell);
        }
        calCard.appendChild(grid);
        if(locs.length){
          var legRow=div({style:{display:'flex',gap:'12px',flexWrap:'wrap',padding:'8px 12px',borderTop:'1px solid var(--bd)'}});
          locs.forEach(function(loc){
            var li=div({style:{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'var(--tx2)'}});
            li.appendChild(div({style:{width:'8px',height:'8px',borderRadius:'50%',background:loc.color}}));
            li.appendChild(txt(loc.name));
            legRow.appendChild(li);
          });
          calCard.appendChild(legRow);
        }
      }
      buildCal(curMonth,curYear);
      content.appendChild(calCard);

      content.appendChild(ci);
    }
    content.appendChild(div({style:{height:'1rem'}}));
    var row2=div({style:{display:'flex',gap:'8px'}});
    row2.appendChild(btn({class:'btn bg',onclick:function(){STATE.ob.step=1;render();}},'Back'));
    row2.appendChild(btn({class:'btn bp',style:{flex:'1'},onclick:function(){STATE.ob.step=3;render();}},'Continue'));
    content.appendChild(row2);

    content.appendChild(el('p',{style:{fontSize:'13px',color:'var(--tx2)',marginBottom:'8px'}},'Add your job locations — each gets its own color on the calendar.'));
    ob.locs.forEach(function(loc,idx){
      var row=div({class:'loc-chip'});
      row.appendChild(div({class:'loc-dot',style:{background:loc.color}}));

      row.appendChild(li);
      if(idx>0){

        STATE.ob.locs.push({id:id,name:'',color:LOC_COLORS[id%LOC_COLORS.length]});
        render();
      }},[ic('pls',14),' Add location']));

    var saveBtn=btn({class:'btn bp',style:{width:'100%'},onclick:function(){}},['Launch ShiftStack']);

// ─── Main App Shell ───────────────────────────────────────────────────────────
function renderApp(){
  var u=SESSION.user;
  var rotations=u.rotations||[];
  if(!rotations.length&&u.rotation) rotations=[Object.assign({},u.rotation,{locationId:0})];
  var schedule=buildSchedule(rotations,SESSION.overrides||{});
  var wrap=div({});
  var page=div({});
  if(STATE.tab==='calendar') page=renderCalendar(schedule,u);
  else if(STATE.tab==='hours') page=renderHours(schedule,u);
  else if(STATE.tab==='group') page=renderGroup(schedule,u);
  else if(STATE.tab==='settings') page=renderSettings(u);
  wrap.appendChild(page);
  if(STATE.modal) wrap.appendChild(renderModal(STATE.modal.key,STATE.modal.data,schedule,u));
  wrap.appendChild(renderNav());
  return wrap;
}

// ─── Calendar Page ────────────────────────────────────────────────────────────
function renderCalendar(schedule,user){
  var locs=user.locations||[];
  var now=new Date();
  if(!STATE.calMonth) STATE.calMonth=now.getMonth();
  if(!STATE.calYear) STATE.calYear=now.getFullYear();
  var month=STATE.calMonth,year=STATE.calYear;
  var pg=div({class:'page'});
  var hdr=div({class:'page-header'});
  hdr.appendChild(div({class:'page-title'},user.name));
  var todayBtn=btn({class:'bg bsm',onclick:function(){STATE.calMonth=now.getMonth();STATE.calYear=now.getFullYear();render();}},['Today']);
  hdr.appendChild(todayBtn);
  pg.appendChild(hdr);
  var card=div({class:'card'});
  var nav=div({class:'month-nav'});
  nav.appendChild(btn({class:'month-btn',onclick:function(){
    if(month===0){STATE.calMonth=11;STATE.calYear=year-1;}else{STATE.calMonth=month-1;}render();
  }},[ic('chl',14)]));
  nav.appendChild(div({class:'month-label'},MONTHS[month]+' '+year));
  nav.appendChild(btn({class:'month-btn',onclick:function(){
    if(month===11){STATE.calMonth=0;STATE.calYear=year+1;}else{STATE.calMonth=month+1;}render();
  }},[ic('chr',14)]));
  card.appendChild(nav);
  var grid=div({class:'cgr'});
  DAYS.forEach(function(d){grid.appendChild(div({class:'cdow'},d));});
  var fdow=new Date(year,month,1).getDay();
  var dim=new Date(year,month+1,0).getDate();
  var today=todayKey();
  for(var i=0;i<fdow;i++) grid.appendChild(div({class:'cd empty'}));
  for(var d=1;d<=dim;d++){
    var key=year+'-'+pad(month+1)+'-'+pad(d);
    var s=schedule[key];
    var locId=s&&s.locationId!=null?s.locationId:null;
    var loc=locId!=null?locs.find(function(l){return l.id===locId;}):null;
    var bg=s&&s.work&&loc?loc.color+'33':'transparent';
    var cls='cd'+(key===today?' today':'')+(s&&s.work?' work':' off');
    var cell=div({class:cls,style:{background:bg}});
    cell.appendChild(el('span',{style:{lineHeight:'1'}},String(d)));
    if(s&&s.override) cell.appendChild(div({class:'od'}));
    else if(s&&s.work&&loc) cell.appendChild(div({style:{width:'4px',height:'4px',borderRadius:'50%',background:loc.color,marginTop:'2px'}}));
    cell.addEventListener('click',function(k,sd){return function(){STATE.modal={key:k,data:sd};render();};}(key,s));
    grid.appendChild(cell);
  }
  card.appendChild(grid);
  if(locs.length){
    var legRow=div({style:{display:'flex',gap:'12px',flexWrap:'wrap',padding:'8px 12px',borderTop:'1px solid var(--bd)'}});
    locs.forEach(function(loc){
      var li=div({style:{display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'var(--tx2)'}});
      li.appendChild(div({style:{width:'8px',height:'8px',borderRadius:'50%',background:loc.color}}));
      li.appendChild(txt(loc.name));
      legRow.appendChild(li);
    });
    card.appendChild(legRow);
  }
  pg.appendChild(card);
  return pg;
}

// ─── Hours Page ───────────────────────────────────────────────────────────────
function renderHours(schedule,user){
  var locs=user.locations||[];
  var now=new Date();
  if(!STATE.hMonth) STATE.hMonth=now.getMonth();
  if(!STATE.hYear) STATE.hYear=now.getFullYear();
  var month=STATE.hMonth,year=STATE.hYear;
  var pg=div({class:'page'});
  pg.appendChild(div({class:'page-header'},[div({class:'page-title'},'Hours Log')]));
  var nav=div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'12px'}});
  nav.appendChild(btn({class:'bg bsm',onclick:function(){
    if(month===0){STATE.hMonth=11;STATE.hYear=year-1;}else STATE.hMonth=month-1;render();
  }},[ic('chl',14)]));
  nav.appendChild(div({style:{fontWeight:'600'}},MONTHS[month]+' '+year));
  nav.appendChild(btn({class:'bg bsm',onclick:function(){
    if(month===11){STATE.hMonth=0;STATE.hYear=year+1;}else STATE.hMonth=month+1;render();
  }},[ic('chr',14)]));
  pg.appendChild(nav);
  var dim=new Date(year,month+1,0).getDate();
  var totalSched=0,totalActual=0;
  var rows=[];
  for(var d=1;d<=dim;d++){
    var key=year+'-'+pad(month+1)+'-'+pad(d);
    var s=schedule[key];
    if(!s||!s.work) continue;
    var ov=SESSION.overrides[key]||{};
    var loc=s.locationId!=null?locs.find(function(l){return l.id===s.locationId;}):null;
    var schedHrs=12;
    var actHrs=ov.hours?parseFloat(ov.hours):schedHrs;
    totalSched+=schedHrs;totalActual+=actHrs;
    rows.push({key:key,d:d,loc:loc,tag:ov.tag,hours:ov.hours,notes:ov.notes,diff:actHrs-schedHrs});
  }
  var summaryRow=div({style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px',marginBottom:'12px'}});
  function statCard(label,val,color){
    var c=div({style:{background:'var(--card)',borderRadius:'10px',border:'1px solid var(--bd)',padding:'10px 12px'}});
    c.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)',marginBottom:'4px'}},label));
    c.appendChild(div({style:{fontSize:'18px',fontWeight:'700',color:color||'var(--tx)'}},String(val)));
    return c;
  }
  summaryRow.appendChild(statCard('Scheduled',totalSched+'h'));
  summaryRow.appendChild(statCard('Actual',totalActual+'h'));
  var diff=totalActual-totalSched;
  summaryRow.appendChild(statCard('Delta',(diff>=0?'+':'')+diff+'h',diff>=0?'var(--ac)':'var(--red)'));
  pg.appendChild(summaryRow);
  if(rows.length===0){
    pg.appendChild(div({style:{textAlign:'center',color:'var(--tx3)',padding:'2rem',fontSize:'14px'}},'No work days this month.'));
    return pg;
  }
  var card=div({class:'card'});
  rows.forEach(function(row){
    var r=div({class:'pay-row'});
    var left=div();
    var dateStr=MONTHS[month].slice(0,3)+' '+row.d;
    left.appendChild(div({style:{fontSize:'13px',fontWeight:'500'}},dateStr+(row.tag?' — '+row.tag:'')));
    if(row.loc) left.appendChild(div({style:{fontSize:'11px',color:'var(--tx3)',marginTop:'2px'}},row.loc.name));
    r.appendChild(left);
    var right=div({style:{textAlign:'right'}});
    right.appendChild(div({class:'pay-val'},(row.hours||'12')+'h'));
    if(row.diff!==0) right.appendChild(div({style:{fontSize:'11px',color:row.diff>0?'var(--ac)':'var(--red)'}},(row.diff>0?'+':'')+row.diff+'h'));
    r.appendChild(right);
    card.appendChild(r);
  });
  pg.appendChild(card);
  return pg;
}

// ─── Group Page ───────────────────────────────────────────────────────────────
function renderGroup(schedule,user){
  var pg=div({class:'page'});
  pg.appendChild(div({class:'page-header'},[div({class:'page-title'},'Group View')]));
  pg.appendChild(div({style:{fontSize:'13px',color:'var(--tx2)',marginBottom:'16px',lineHeight:'1.6'}},'See a friend\'s schedule alongside yours. Enter their handle to overlay their days off.'));
  var handleInput=inp({placeholder:'friend_handle',value:STATE.groupHandle||''});
  handleInput.addEventListener('input',function(){STATE.groupHandle=this.value.toLowerCase().replace(/[^a-z0-9_]/g,'');this.value=STATE.groupHandle;});
  pg.appendChild(handleInput);
  var lookupBtn=btn({class:'btn bp',style:{width:'100%',marginTop:'8px'},onclick:function(){
    if(!STATE.groupHandle) return;
    lookupBtn.disabled=true;lookupBtn.innerHTML='';lookupBtn.appendChild(div({class:'spinner'}));
    dbGetUser(STATE.groupHandle).then(function(friend){
      if(!friend){STATE.groupData=null;STATE.groupErr='Handle not found';}
      else return dbGetOverrides(friend.id).then(function(ov){
        var rots=friend.rotations||[];
        if(!rots.length&&friend.rotation) rots=[Object.assign({},friend.rotation,{locationId:0})];
        STATE.groupData={user:friend,schedule:buildSchedule(rots,ov)};
        STATE.groupErr=null;
      });
    }).catch(function(){STATE.groupErr='Could not load schedule';STATE.groupData=null;})
    .finally(function(){render();});
  }},'Look up');
  pg.appendChild(lookupBtn);
  if(STATE.groupErr) pg.appendChild(div({class:'err'},STATE.groupErr));
  if(STATE.groupData){
    var friend=STATE.groupData.user;
    var fSched=STATE.groupData.schedule;
    pg.appendChild(div({class:'ok'},'Showing @'+friend.handle+' ('+friend.name+')'));
    var now=new Date();
    var month=now.getMonth(),year=now.getFullYear();
    var card=div({class:'card',style:{marginTop:'12px'}});
    var nav=div({class:'month-nav'});
    if(!STATE.groupMonth){STATE.groupMonth=month;STATE.groupYear=year;}
    var gm=STATE.groupMonth,gy=STATE.groupYear;
    nav.appendChild(btn({class:'month-btn',onclick:function(){
      if(gm===0){STATE.groupMonth=11;STATE.groupYear=gy-1;}else STATE.groupMonth=gm-1;render();
    }},[ic('chl',14)]));
    nav.appendChild(div({class:'month-label'},MONTHS[gm]+' '+gy));
    nav.appendChild(btn({class:'month-btn',onclick:function(){
      if(gm===11){STATE.groupMonth=0;STATE.groupYear=gy+1;}else STATE.groupMonth=gm+1;render();
    }},[ic('chr',14)]));
    card.appendChild(nav);
    var grid=div({class:'cgr'});
    DAYS.forEach(function(d){grid.appendChild(div({class:'cdow'},d));});
    var fdow=new Date(gy,gm,1).getDay();
    var dim=new Date(gy,gm+1,0).getDate();
    var today=todayKey();
    for(var i=0;i<fdow;i++) grid.appendChild(div({class:'cd empty'}));
    for(var d=1;d<=dim;d++){
      var key=gy+'-'+pad(gm+1)+'-'+pad(d);
      var myS=schedule[key];
      var frS=fSched[key];
      var bothOff=!(myS&&myS.work)&&!(frS&&frS.work);
      var cell=div({class:'cd'+(key===today?' today':'')+(bothOff?' work':''),style:{background:bothOff?'#1D9E7533':'transparent'}});
      cell.appendChild(el('span',{style:{lineHeight:'1'}},String(d)));
      if(bothOff) cell.appendChild(div({style:{fontSize:'8px',color:'var(--ac)',marginTop:'1px'}},'both'));
      grid.appendChild(cell);
    }
    card.appendChild(grid);
    var leg=div({style:{padding:'8px 12px',borderTop:'1px solid var(--bd)',fontSize:'11px',color:'var(--tx3)'}});
    leg.appendChild(div({style:{display:'flex',alignItems:'center',gap:'6px'}},[div({style:{width:'8px',height:'8px',borderRadius:'2px',background:'#1D9E7533',border:'1px solid var(--ac)'}}),txt('Both off — good days to plan')]));
    card.appendChild(leg);
    pg.appendChild(card);
  }
  return pg;
}

    copyBtn.innerHTML='';copyBtn.appendChild(ic('chk',15));copyBtn.appendChild(txt(' Copied!'));
    setTimeout(function(){copyBtn.innerHTML='';copyBtn.appendChild(ic('cpy',15));copyBtn.appendChild(txt(' Copy link'));},2000);
  }},[ic('cpy',15),' Copy link']);
  shareCard.appendChild(copyBtn);
  pg.appendChild(shareCard);
  pg.appendChild(div({class:'section-label'},'Add to home screen'));
  var pwaCard=div({class:'card',style:{padding:'14px'}});
  pwaCard.appendChild(el('p',{style:{fontSize:'13px',color:'var(--tx2)',lineHeight:'1.6',marginBottom:'0'}},'Share this link with your family. They can add it to their iPhone or Android home screen — it opens like an app and always shows your latest schedule.'));
  pg.appendChild(pwaCard);
  pg.appendChild(div({class:'section-label'},'Pay settings'));
  var payNote=div({class:'card',style:{padding:'14px'}});
  payNote.appendChild(div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}},[ic('lck',16),div({style:{fontSize:'13px',fontWeight:'600'}},'Pay info stays private')]));
  payNote.appendChild(el('p',{style:{fontSize:'12px',color:'var(--tx3)',lineHeight:'1.6'}},'Your pay rate, overtime multipliers, and pay period estimates are stored only in your account and are never accessible from the public share link.'));
  pg.appendChild(payNote);
  if(!STATE.showPay){
    pg.appendChild(btn({class:'btn bg',style:{width:'100%',marginTop:'4px'},onclick:function(){STATE.showPay=true;render();}},'View pay settings'));
  } else {
    renderPaySettings(pg,user);
  }
  pg.appendChild(div({class:'section-label'},'Account'));
  var acct=div({class:'card'});
  acct.appendChild(div({class:'toggle-row'},[div([div({style:{fontSize:'14px',fontWeight:'500'}},'Name'),div({style:{fontSize:'12px',color:'var(--tx3)'}},user.name)])]));
  acct.appendChild(div({class:'toggle-row'},[div([div({style:{fontSize:'14px',fontWeight:'500'}},'Handle'),div({style:{fontSize:'12px',color:'var(--tx3)'}},'@'+user.handle)])]));
  pg.appendChild(acct);
  pg.appendChild(div({class:'section-label'},'Danger zone'));
  var dangerCard=div({class:'card',style:{padding:'14px'}});
  dangerCard.appendChild(el('p',{style:{fontSize:'13px',color:'var(--tx2)',marginBottom:'12px'}},'Sign out of this device. Your data stays in the cloud.'));
  dangerCard.appendChild(btn({class:'btn bd2',style:{width:'100%'},onclick:function(){
    if(confirm('Sign out of ShiftStack on this device?')){
      SESSION.user=null;SESSION.overrides={};SESSION.pay=null;
      STATE={tab:'calendar',modal:null,ob:{step:0,name:'',handle:'',handleOk:null,presetId:'10on4off',anchorDate:fmtDate(new Date()),locs:[{id:0,name:'Primary Job',color:LOC_COLORS[0]}],customPat:''}};
      render();
    }
  }},'Sign out'));
  pg.appendChild(dangerCard);
  return pg;
}

function renderPaySettings(pg,user){
  var pay=SESSION.pay||{rateHistory:[],payPeriodAnchor:fmtDate(new Date()),raiseMonth:'10',payRules:{presetId:'govt',otThreshold:8,otMult:1.5,dtThreshold:12,dtMult:2,weeklyOtThreshold:40,useWeeklyOt:false},differentials:[]};
  var card=div({class:'card',style:{marginTop:'8px'}});
  var hdr=div({style:{padding:'12px 14px',borderBottom:'1px solid var(--bd)',fontSize:'14px',fontWeight:'600',display:'flex',alignItems:'center',gap:'8px'}});
  hdr.appendChild(ic('dol',16));hdr.appendChild(txt('Pay settings'));
  card.appendChild(hdr);
  var rateRow=div({class:'pay-row'});
  rateRow.appendChild(div({style:{fontSize:'13px'}},'Hourly rate'));
  var rateIn=inp({type:'number',placeholder:'0.00',value:pay.rateHistory&&pay.rateHistory.length?pay.rateHistory[pay.rateHistory.length-1].rate:'',style:{width:'90px',textAlign:'right'}});
  rateIn.addEventListener('change',function(){
    if(!pay.rateHistory) pay.rateHistory=[];
    pay.rateHistory.push({rate:parseFloat(this.value),date:fmtDate(new Date())});
    dbUpsertPay(user.id,pay).catch(function(){});
  });
  rateRow.appendChild(rateIn);
  card.appendChild(rateRow);
  var otRow=div({class:'pay-row'});
  otRow.appendChild(div({style:{fontSize:'13px'}},'OT starts after (hrs/day)'));
  var otIn=inp({type:'number',value:pay.payRules?pay.payRules.otThreshold:8,style:{width:'60px',textAlign:'right'}});
  otIn.addEventListener('change',function(){
    if(!pay.payRules) pay.payRules={};
    pay.payRules.otThreshold=parseFloat(this.value);
    dbUpsertPay(user.id,pay).catch(function(){});
  });
  otRow.appendChild(otIn);
  card.appendChild(otRow);
  var otMRow=div({class:'pay-row'});
  otMRow.appendChild(div({style:{fontSize:'13px'}},'OT multiplier'));
  var otMIn=inp({type:'number',value:pay.payRules?pay.payRules.otMult:1.5,step:'0.1',style:{width:'60px',textAlign:'right'}});
  otMIn.addEventListener('change',function(){
    if(!pay.payRules) pay.payRules={};
    pay.payRules.otMult=parseFloat(this.value);
    dbUpsertPay(user.id,pay).catch(function(){});
  });
  otMRow.appendChild(otMIn);
  card.appendChild(otMRow);
  pg.appendChild(card);
}

// ─── Boot: check for existing session or sign-in ──────────────────────────────
(function boot(){
  var params=new URLSearchParams(window.location.search);
  var pub=params.get('view');
  if(pub){render();return;}
  var savedHandle=localStorage.getItem('ss_handle');
  if(savedHandle){
    dbGetUser(savedHandle).then(function(u){
      if(u){
        SESSION.user=u;
        return dbGetOverrides(u.id).then(function(ov){
          SESSION.overrides=ov;
          return dbGetPay(u.id).then(function(pay){
            SESSION.pay=pay;
            render();
          });
        });
      } else {
        localStorage.removeItem('ss_handle');
        render();
      }
    }).catch(function(){render();});
  } else {
    render();
  }
})();

// Save handle to localStorage after login so we can auto-login next time
var _origCreateUser=dbCreateUser;
dbCreateUser=function(data){
  return _origCreateUser(data).then(function(u){
    if(u&&u.handle) localStorage.setItem('ss_handle',u.handle);
    return u;
  });
};
</script>
